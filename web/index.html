<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Counter-Strike 1.6 — Browser (Xash3D-FWGS WASM)</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    canvas { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
    #overlay { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a, #000); display: flex;
               flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 10; }
    #title { font-size: 2.2rem; font-weight: bold; color: #ffcc00; text-shadow: 2px 2px 8px #000; margin-bottom: 25px; }
    #bar-wrap { width: 60%; height: 24px; background: rgba(255,255,255,.1); border: 2px solid #ffcc00;
                border-radius: 5px; overflow: hidden; box-shadow: 0 0 10px #ffcc00; }
    #bar { width: 0; height: 100%; background: linear-gradient(90deg, #ffaa00, #ffcc00); transition: width .2s ease; }
    #status { margin-top: 15px; font-size: 1rem; text-align: center; }
  </style>
  <!-- JSZip (vendorizado, UMD global) e o loader do engine (vendorizado, xash3d-fwgs 1.0.1) -->
  <script src="vendor/jszip.min.js"></script>
  <script src="engine/raw.js"></script>
</head>
<body>
  <div id="overlay">
    <div id="title">COUNTER-STRIKE 1.6</div>
    <div id="bar-wrap"><div id="bar"></div></div>
    <div id="status">Preparando…</div>
  </div>
  <canvas id="canvas"></canvas>

  <script>
    const statusEl = document.getElementById('status');
    const barEl = document.getElementById('bar');
    const setStatus = (m) => { statusEl.innerText = m; };
    const setProgress = (p) => { barEl.style.width = p + '%'; };

    async function main() {
      const overlay = document.getElementById('overlay');
      const canvas = document.getElementById('canvas');

      // Define a RESOLUÇÃO do framebuffer (atributos width/height). Sem isso o canvas
      // fica em 300x150 (default) e o engine reclama "invalid mode" -> 640x480 / tela preta.
      const W = Math.min(window.innerWidth, 1280) || 1280;
      const H = Math.min(window.innerHeight, 720) || 720;
      canvas.width = W;
      canvas.height = H;

      try {
        // Assets do jogo: pré-extraídos em memória ANTES de iniciar o engine, e gravados
        // de forma SÍNCRONA no onRuntimeInitialized (o emscripten não aguarda um
        // onRuntimeInitialized async -> 'couldn't find game directory cstrike').
        setStatus('Baixando assets…');
        const res = await fetch('./game.zip');
        if (!res.ok) throw new Error('game.zip não encontrado (' + res.status + ')');
        const zip = await JSZip.loadAsync(await res.arrayBuffer());
        const entries = Object.keys(zip.files).filter((p) => !zip.files[p].dir);
        const total = entries.length;

        const files = {};
        let n = 0;
        await Promise.all(entries.map(async (p) => {
          files['/rodir/' + p] = await zip.files[p].async('uint8array');
          if (++n % 20 === 0 || n === total) {
            setProgress(Math.floor((n / total) * 100));
            setStatus(`Lendo arquivos… (${n}/${total})`);
          }
        }));

        // Integração estilo webxash3d-fwgs (engine 1.0.1, renderer gles3compat). O @latest
        // (1.2.x / webgl2) tem regressão no GL — ver scripts/fetch-engine.sh.
        setStatus('Iniciando o engine…');
        Xash3D({
          arguments: ['-windowed', '-width', String(W), '-height', String(H), '-game', 'cstrike', '+_vgui_menus', '0', '-console', '+developer', '1'],
          canvas,
          ctx: canvas.getContext('webgl2', { alpha: false, depth: true, stencil: true, antialias: true }),
          dynamicLibraries: [
            'filesystem_stdio.wasm',
            'libref_gles3compat.wasm',
            'cl_dlls/menu_emscripten_wasm32.wasm',
            'dlls/cs_emscripten_wasm32.so',
            'cl_dlls/client_emscripten_wasm32.wasm',
            '/rwdir/filesystem_stdio.so',
          ],
          onRuntimeInitialized: function () {
            Object.keys(files).forEach((full) => {
              const dir = full.slice(0, full.lastIndexOf('/'));
              this.FS.mkdirTree(dir);
              this.FS.writeFile(full, files[full]);
            });
            try { this.FS.mkdir('/rwdir'); } catch (e) {}
            this.FS.chdir('/rodir');
            setProgress(100);

            // Auto-inicia de_dust2 e ENCHE DE BOTS via Cmd_ExecuteString, depois que o engine
            // sobe. O Zbot está embutido no cs16-client (bot_add/bot_quota + BotProfile.db).
            const mod = this;
            const run = (cmd) => {
              try { mod.ccall('Cmd_ExecuteString', null, ['string'], [cmd]); }
              catch (e) { console.error('cmd falhou:', cmd, e); }
            };
            setStatus('Carregando de_dust2…');
            setTimeout(() => { overlay.style.display = 'none'; }, 1500);
            // Só carrega o mapa e prepara o servidor p/ bots. VOCÊ escolhe o time e adiciona
            // os bots pelo console (bot_add / bot_quota 6). Sem auto-join nem auto-bots.
            // maxplayers ANTES do mapa: senão o listen server abre com poucas vagas
            // -> não cabe bot -> "team full". 12 vagas = você + 11 bots.
            setTimeout(() => { run('maxplayers 12'); run('map de_dust2'); }, 4000);
            setTimeout(() => {
              run('exec listenserver.cfg');
              run('mp_limitteams 0'); run('mp_autoteambalance 0');
              run('bot_join_team any'); run('bot_quota_mode normal');
            }, 12000);
          },
          locateFile: (p) => {
            switch (p) {
              case 'xash.wasm': return 'engine/xash.wasm';
              case '/rwdir/filesystem_stdio.so':
              case 'filesystem_stdio.wasm': return 'engine/filesystem_stdio.wasm';
              case 'libref_gles3compat.wasm': return 'engine/libref_gles3compat.wasm';
              case 'libref_soft.wasm': return 'engine/libref_soft.wasm';
              case 'libref_webgl2.wasm': return 'engine/libref_webgl2.wasm';
              case 'cl_dlls/menu_emscripten_wasm32.wasm': return 'cs16-client/cl_dll/menu_emscripten_wasm32.wasm';
              case 'dlls/cs_emscripten_wasm32.so': return 'cs16-client/dlls/cs_emscripten_wasm32.so';
              case 'cl_dlls/client_emscripten_wasm32.wasm': return 'cs16-client/cl_dll/client_emscripten_wasm32.wasm';
              default: return p;
            }
          },
        });
      } catch (e) {
        setStatus('Falha ao carregar. Veja o console.');
        console.error('Falha ao carregar o jogo:', e);
      }
    }
    main();
  </script>
</body>
</html>
